<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" type="text/css" media="all"  href="./static/css/registrationStyle.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
</head>
<body>
    <div class="auth">
        <h1 class="auth-title">Регистрация</h1>

        <form action="/registration" method="post">
            <div class="form-group">
                <input class="input" type="text" name="surname"
                placeholder="Ваша фамилия">
            </div>

            <div class="form-group">
                <input class="input" type="text" name="name"
                       placeholder="Ваше имя">
            </div>

            <div class="form-group">
                <input class="input" type="text" name="patronymic"
                       placeholder="Ваше отчество">
            </div>

            <div class="form-group">
                <input class="input" type="tel" name="phoneNumber"
                placeholder="Ваш номер телефона">
            </div>

            <div class="form-group">
                <input class="input" type="text" name="username"
                       placeholder="Придуамйте логин">
            </div>

            <div class="form-group">
                <input class="input" type="password" name="password"
                placeholder="Придумайте пароль">
            </div>

            <div class="form-group">
                <input class="input" type="password" name="password_confirm"
                placeholder="Подтвердите пароль">
            </div>

            <div class="form-group">
                <input class="" type="checkbox" name="rules" id="rules">
                <label for="rules">Ознакомлен с правилами</label>
            </div>

            <button class="btn" type="submit">Зарегистрироваться</button>

            <!--CSRF Token-->
            <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}" />
        </form>
    </div>
</body>
</html>
