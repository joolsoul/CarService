<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Getting Started: Serving Web Content</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
<div>
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Sign Out"/>
    </form>
</div>

<div>
    <form method="post" action="">
        <input type="text" name="registrationNumber" placeholder="Введите регистрационый номер автомобиля">
        <input type="text" name="carBrand" placeholder="Введите марку автомобиля">
        <!--CSRF Token-->
        <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}" />
        <button type="submit">Добавить</button>
        <a href=""></a>
    </form>
</div>

<div>Список автомобилей</div>
<ul>
    <th:block th:each="car : ${cars}">
        <li th:utext="${car.owner}">..</li>
        <li th:utext="${car.carBrand}">..</li>
        <li th:utext="${car.registrationNumber}">..</li>
        <a href="/user/deleteCar/" th:attrappend="href=${car.id}">Удалить машину</a>
        <a href="/user/editCar/" th:attrappend="href=${car.id}">Редактировать машину</a>
        <p>-----------------------------------------</p>
    </th:block>
</ul>

    <a href="/user/" th:attrappend="href=${user.id + '-edit'}">Редактировать аккаунт</a>
</body>
</html>
